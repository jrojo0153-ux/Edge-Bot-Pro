name: Edge Bot Pro

on:
  schedule:
    - cron: "*/30 * * * *"  # cada 30 minutos

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py

name: EDGE BOT PRO - Multi Deporte

on:
  schedule:
    - cron: "*/30 * * * *"    # Ejecución normal cada 30 min
    - cron: "0 4 * * *"       # AUDITORÍA: 10 PM hora México (04:00 UTC)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRÍTICO: Permite al bot guardar datos en tu repo

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Edge Bot Pro
        run: python main.py
        env:
          API_KEY_ODDS: ${{ secrets.API_KEY_ODDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # --- NUEVO: AUTO-GUARDADO (GIT PUSH) ---
      - name: Guardar Cambios en Historico
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv ml/models/*.pkl
          git commit -m "Actualización automática: Histórico y Modelos [skip ci]" || echo "No hay cambios para guardar"
          git push
